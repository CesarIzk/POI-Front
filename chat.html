<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - POI</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4px 12px;
        }
        .sidebar-header h2 { margin: 0; }
        #btnNuevoChat {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: #5865f2;
            color: white;
            font-size: 20px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.15s;
        }
        #btnNuevoChat:hover { background: #4752c4; transform: scale(1.1); }
        #modalNuevoChat.open { display: flex !important; }
        .usuario-resultado {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 8px;
            background: #2a2a3e;
            cursor: pointer;
            border: 1px solid transparent;
            transition: border-color 0.15s;
        }
        .usuario-resultado.seleccionado { border-color: #5865f2; }
        .usuario-resultado .avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: #5865f2;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 14px;
        }
    </style>
</head>
<body class="chat-layout">

    <nav class="side-menu">
        <div class="menu-item"><a href="home.html">🏠</a></div>
        <div class="menu-item active">💬</div>
        <div class="menu-item">🏆</div>
    </nav>

    <aside class="chats-sidebar">
        <div class="sidebar-header">
            <h2>Chats</h2>
            <button id="btnNuevoChat" onclick="abrirModalNuevoChat()" title="Nuevo chat / Agregar amigo">＋</button>
        </div>
        <div id="chatList"></div>
    </aside>

    <!-- Modal: Nuevo chat / Agregar amigo -->
    <div id="modalNuevoChat" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:2000; align-items:center; justify-content:center;">
        <div style="background:#1e1e2e; border:1px solid #444; border-radius:14px; padding:28px 32px; width:340px; color:white; box-shadow:0 8px 32px rgba(0,0,0,0.6);">
            <h3 style="margin:0 0 6px; font-size:17px;">➕ Nuevo Chat</h3>
            <p style="margin:0 0 18px; font-size:13px; color:#aaa;">Busca un usuario por su alias para iniciar un chat.</p>

            <input
                type="text"
                id="buscarAliasInput"
                placeholder="Alias del usuario..."
                style="width:100%; padding:10px 12px; border-radius:8px; border:1px solid #555; background:#12121f; color:white; font-size:14px; box-sizing:border-box; margin-bottom:10px;"
                oninput="buscarUsuario()"
            >

            <div id="resultadoBusqueda" style="margin-bottom:14px; min-height:36px; font-size:14px; color:#ccc;"></div>

            <div style="display:flex; gap:10px; justify-content:flex-end;">
                <button onclick="cerrarModalNuevoChat()" style="padding:8px 18px; border-radius:8px; border:1px solid #555; background:transparent; color:#aaa; cursor:pointer;">Cancelar</button>
                <button id="btnCrearChat" onclick="crearChatConUsuario()" disabled style="padding:8px 18px; border-radius:8px; border:none; background:#5865f2; color:white; cursor:pointer; font-weight:bold; opacity:0.5;">Iniciar Chat</button>
            </div>
        </div>
    </div>

    <main class="chat-window">
        <header class="chat-header">
            <h3 id="chatTitle">Selecciona un chat</h3>
            <div class="header-actions">
                <span style="cursor:pointer;" onclick="iniciarLlamada()">🎥</span>
            </div>
        </header>

        <div class="messages-area" id="messages"></div>

        <footer class="input-area">
            <form id="chatForm">
                <input type="text" id="mensajeInput" placeholder="Escribe tu mensaje..." required>
            </form>
        </footer>
    </main>

    <aside class="info-sidebar">
        <div class="side-card">
            <h3>Tareas (POI)</h3>
            <ul>
                <li><input type="checkbox" checked> Tarea semanal (+100)</li>
                <li><input type="checkbox" checked> Terminar pendientes (+5)</li>
                <li><input type="checkbox" checked> Arreglar interfaz (+5)</li>
            </ul>
        </div>
        <div class="side-card">
            <h3>Nivel</h3>
            <p id="nivelSidebar">...</p>
            <div class="progress-bar"><div class="progress-fill"></div></div>
            <div class="badge">LIGA PROFESIONAL ⚽</div>
        </div>
    </aside>

    <!-- 🎥 Modal de videollamada -->
    <div id="videoModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:1000; flex-direction:column; align-items:center; justify-content:center;">
        <div style="display:flex; gap:16px; margin-bottom:20px; flex-wrap:wrap; justify-content:center;">
            <div style="position:relative;">
                <video id="remoteVideo" autoplay playsinline style="width:520px; height:340px; background:#111; border-radius:12px;"></video>
                <span style="position:absolute; top:8px; left:12px; color:white; font-size:12px; background:rgba(0,0,0,0.5); padding:2px 8px; border-radius:4px;">Remoto</span>
            </div>
            <div style="position:relative;">
                <video id="localVideo" autoplay playsinline muted style="width:200px; height:150px; background:#222; border-radius:12px;"></video>
                <span style="position:absolute; top:8px; left:12px; color:white; font-size:12px; background:rgba(0,0,0,0.5); padding:2px 8px; border-radius:4px;">Tú</span>
            </div>
        </div>
        <div style="display:flex; gap:12px;">
            <button id="btnToggleMic" onclick="toggleMic()" style="padding:10px 20px; border-radius:8px; border:none; background:#444; color:white; cursor:pointer; font-size:15px;">🎤</button>
            <button id="btnToggleCam" onclick="toggleCam()" style="padding:10px 20px; border-radius:8px; border:none; background:#444; color:white; cursor:pointer; font-size:15px;">📷</button>
            <button onclick="colgarLlamada()" style="padding:10px 28px; border-radius:8px; border:none; background:#e74c3c; color:white; cursor:pointer; font-weight:bold; font-size:15px;">📵 Colgar</button>
        </div>
        <p id="videoStatus" style="color:#aaa; margin-top:14px; font-size:13px;">Conectando...</p>
    </div>

    <!-- 🔔 Modal llamada entrante -->
    <div id="incomingModal" style="display:none; position:fixed; bottom:24px; right:24px; background:#1e1e2e; border:1px solid #555; border-radius:12px; padding:20px 24px; z-index:1001; color:white; text-align:center; box-shadow:0 4px 20px rgba(0,0,0,0.5);">
        <p style="margin:0 0 14px; font-size:15px;">📞 Videollamada entrante...</p>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button onclick="aceptarLlamada()" style="padding:8px 18px; background:#2ecc71; border:none; border-radius:8px; color:white; cursor:pointer; font-weight:bold;">✅ Aceptar</button>
            <button onclick="rechazarLlamada()" style="padding:8px 18px; background:#e74c3c; border:none; border-radius:8px; color:white; cursor:pointer; font-weight:bold;">❌ Rechazar</button>
        </div>
    </div>

    <script>
        const usuario = JSON.parse(localStorage.getItem("usuario"));
        if (!usuario) {
            window.location.href = "index.html";
        } else {
            window.usuarioId = usuario.id;
            document.getElementById("nivelSidebar").innerText = usuario.nombre + " - Nivel " + usuario.nivel;
        }
    </script>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/videocall.js"></script>

    <script>
        let usuarioSeleccionado = null;
        let buscarTimeout = null;

        function abrirModalNuevoChat() {
            usuarioSeleccionado = null;
            document.getElementById("buscarAliasInput").value = "";
            document.getElementById("resultadoBusqueda").innerHTML = "";
            document.getElementById("btnCrearChat").disabled = true;
            document.getElementById("btnCrearChat").style.opacity = "0.5";
            document.getElementById("modalNuevoChat").classList.add("open");
            setTimeout(() => document.getElementById("buscarAliasInput").focus(), 100);
        }

        function cerrarModalNuevoChat() {
            document.getElementById("modalNuevoChat").classList.remove("open");
        }

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("modalNuevoChat").addEventListener("click", function(e) {
                if (e.target === this) cerrarModalNuevoChat();
            });
        });

        // Cache para no re-fetch en cada tecla
        let _todosLosUsuarios = null;

        async function cargarTodosLosUsuarios() {
            if (_todosLosUsuarios) return _todosLosUsuarios;
            const token = localStorage.getItem("token");
            const res = await fetch(API_URL + "/api/chats/users", {
                headers: { "Authorization": "Bearer " + token }
            });
            const data = await res.json();
            // Excluir al usuario actual
            _todosLosUsuarios = (data || []).filter(u => (u.IdUsuario ?? u.id) != window.usuarioId);
            return _todosLosUsuarios;
        }

        async function buscarUsuario() {
            clearTimeout(buscarTimeout);
            const texto = document.getElementById("buscarAliasInput").value.trim().toLowerCase();
            const resultado = document.getElementById("resultadoBusqueda");

            if (texto.length < 2) { resultado.innerHTML = ""; return; }

            buscarTimeout = setTimeout(async () => {
                resultado.innerHTML = "<span style=\"color:#888; font-size:13px;\">Buscando...</span>";
                try {
                    const todos = await cargarTodosLosUsuarios();

                    const filtrados = todos.filter(u =>
                        (u.Alias || u.alias || "").toLowerCase().includes(texto) ||
                        (u.Nombre || u.nombre || "").toLowerCase().includes(texto)
                    );

                    if (filtrados.length === 0) {
                        resultado.innerHTML = "<span style=\"color:#e74c3c; font-size:13px;\">No se encontró ningún usuario</span>";
                        return;
                    }

                    resultado.innerHTML = "";
                    filtrados.slice(0, 5).forEach(u => {
                        const id     = u.IdUsuario ?? u.id;
                        const alias  = u.Alias  ?? u.alias  ?? "?";
                        const nombre = u.Nombre ?? u.nombre ?? "";

                        const div = document.createElement("div");
                        div.className = "usuario-resultado";
                        div.innerHTML =
                            "<div class=\"avatar\">" + alias[0].toUpperCase() + "</div>" +
                            "<div><strong>" + alias + "</strong>" +
                            "<div style=\"font-size:12px; color:#888;\">" + nombre + "</div></div>";
                        div.onclick = () => seleccionarUsuario({ id, alias, nombre }, div);
                        resultado.appendChild(div);
                    });
                } catch (err) {
                    console.error(err);
                    resultado.innerHTML = "<span style=\"color:#e74c3c; font-size:13px;\">Error al buscar</span>";
                }
            }, 300);
        }

        function seleccionarUsuario(usuario, elem) {
            usuarioSeleccionado = usuario;
            document.querySelectorAll(".usuario-resultado").forEach(el => el.classList.remove("seleccionado"));
            elem.classList.add("seleccionado");
            document.getElementById("btnCrearChat").disabled = false;
            document.getElementById("btnCrearChat").style.opacity = "1";
        }

        async function crearChatConUsuario() {
            if (!usuarioSeleccionado) return;
            const btn = document.getElementById("btnCrearChat");
            btn.textContent = "Creando...";
            btn.disabled = true;
            try {
                const token = localStorage.getItem("token");
                const res = await fetch(API_URL + "/api/chats", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                    body: JSON.stringify({ usuarioDestino: usuarioSeleccionado.id })
                });
                const data = await res.json();
                if (data && data.IdChat) {
                    cerrarModalNuevoChat();
                    await cargarChats();
                    abrirChat(data.IdChat, usuarioSeleccionado.alias);
                } else {
                    alert(data.message || "No se pudo crear el chat");
                }
            } catch (err) {
                alert("Error al crear el chat");
            } finally {
                btn.textContent = "Iniciar Chat";
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        }
    </script>

</body>
</html>
