<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - POI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="chat-layout">

    <nav class="side-menu">
        <div class="menu-item"><a href="home.html">🏠</a></div>
        <div class="menu-item active">💬</div>
        <div class="menu-item">🏆</div>
    </nav>

    <aside class="chats-sidebar">
        <h2>Chats</h2>
        <div id="chatList"></div>
    </aside>

    <main class="chat-window">
        <header class="chat-header">
            <h3 id="chatTitle">Selecciona un chat</h3>
            <div class="header-actions">
                <span style="cursor:pointer;" onclick="iniciarLlamada()">🎥</span>
            </div>
        </header>

        <div class="messages-area" id="messages"></div>

        <footer class="input-area">
            <form id="chatForm">
                <input type="text" id="mensajeInput" placeholder="Escribe tu mensaje..." required>
            </form>
        </footer>
    </main>

    <aside class="info-sidebar">
        <div class="side-card">
            <h3>Tareas (POI)</h3>
            <ul>
                <li><input type="checkbox" checked> Tarea semanal (+100)</li>
                <li><input type="checkbox" checked> Terminar pendientes (+5)</li>
                <li><input type="checkbox" checked> Arreglar interfaz (+5)</li>
            </ul>
        </div>
        <div class="side-card">
            <h3>Nivel</h3>
            <p id="nivelSidebar">...</p>
            <div class="progress-bar"><div class="progress-fill"></div></div>
            <div class="badge">LIGA PROFESIONAL ⚽</div>
        </div>
    </aside>

    <!-- 🎥 Modal de videollamada -->
    <div id="videoModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:1000; flex-direction:column; align-items:center; justify-content:center;">
        <div style="display:flex; gap:16px; margin-bottom:20px; flex-wrap:wrap; justify-content:center;">
            <div style="position:relative;">
                <video id="remoteVideo" autoplay playsinline style="width:520px; height:340px; background:#111; border-radius:12px;"></video>
                <span style="position:absolute; top:8px; left:12px; color:white; font-size:12px; background:rgba(0,0,0,0.5); padding:2px 8px; border-radius:4px;">Remoto</span>
            </div>
            <div style="position:relative;">
                <video id="localVideo" autoplay playsinline muted style="width:200px; height:150px; background:#222; border-radius:12px;"></video>
                <span style="position:absolute; top:8px; left:12px; color:white; font-size:12px; background:rgba(0,0,0,0.5); padding:2px 8px; border-radius:4px;">Tú</span>
            </div>
        </div>
        <div style="display:flex; gap:12px;">
            <button id="btnToggleMic" onclick="toggleMic()" style="padding:10px 20px; border-radius:8px; border:none; background:#444; color:white; cursor:pointer; font-size:15px;">🎤</button>
            <button id="btnToggleCam" onclick="toggleCam()" style="padding:10px 20px; border-radius:8px; border:none; background:#444; color:white; cursor:pointer; font-size:15px;">📷</button>
            <button onclick="colgarLlamada()" style="padding:10px 28px; border-radius:8px; border:none; background:#e74c3c; color:white; cursor:pointer; font-weight:bold; font-size:15px;">📵 Colgar</button>
        </div>
        <p id="videoStatus" style="color:#aaa; margin-top:14px; font-size:13px;">Conectando...</p>
    </div>

    <!-- 🔔 Modal llamada entrante -->
    <div id="incomingModal" style="display:none; position:fixed; bottom:24px; right:24px; background:#1e1e2e; border:1px solid #555; border-radius:12px; padding:20px 24px; z-index:1001; color:white; text-align:center; box-shadow:0 4px 20px rgba(0,0,0,0.5);">
        <p style="margin:0 0 14px; font-size:15px;">📞 Videollamada entrante...</p>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button onclick="aceptarLlamada()" style="padding:8px 18px; background:#2ecc71; border:none; border-radius:8px; color:white; cursor:pointer; font-weight:bold;">✅ Aceptar</button>
            <button onclick="rechazarLlamada()" style="padding:8px 18px; background:#e74c3c; border:none; border-radius:8px; color:white; cursor:pointer; font-weight:bold;">❌ Rechazar</button>
        </div>
    </div>

    <script>
        const usuario = JSON.parse(localStorage.getItem("usuario"));
        if (!usuario) {
            window.location.href = "index.html";
        } else {
            window.usuarioId = usuario.id;
            document.getElementById("nivelSidebar").innerText = usuario.nombre + " - Nivel " + usuario.nivel;
        }
    </script>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/videocall.js"></script>

</body>
</html>
