<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - POI</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0f14;
            --surface: #13161e;
            --surface2: #1a1e2a;
            --border: #252a38;
            --accent: #4f8eff;
            --accent2: #7c5cfc;
            --gold: #f0b429;
            --green: #2ecc71;
            --red: #e74c3c;
            --text: #e8eaf0;
            --text-muted: #6b7280;
            --glow: rgba(79,142,255,0.15);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; display:flex; }

        /* Nav */
        .side-menu { width:64px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; align-items:center; padding:24px 0; gap:8px; position:fixed; top:0; left:0; bottom:0; z-index:100; }
        .menu-item { width:44px; height:44px; display:flex; align-items:center; justify-content:center; border-radius:12px; cursor:pointer; font-size:20px; transition:background 0.2s,transform 0.15s; color:var(--text-muted); text-decoration:none; }
        .menu-item a { color:inherit; text-decoration:none; font-size:20px; }
        .menu-item:hover { background:var(--surface2); transform:scale(1.08); }
        .menu-item.active { background:var(--glow); color:var(--accent); box-shadow:0 0 0 1px var(--accent); }

        /* Main */
        .main-content { margin-left:64px; flex:1; padding:24px 32px; max-width:860px; }

        /* Top bar */
        .top-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; animation:fadeDown 0.5s ease both; }
        .top-bar h1 { font-family:'Rajdhani',sans-serif; font-size:28px; font-weight:700; letter-spacing:2px; text-transform:uppercase; }
        .user-avatar-small { width:38px; height:38px; background:var(--surface2); border:1px solid var(--border); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; cursor:pointer; transition:border-color 0.2s; }
        .user-avatar-small:hover { border-color:var(--accent); }

        /* Profile */
        .profile-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:24px; display:flex; align-items:center; gap:20px; margin-bottom:24px; position:relative; overflow:hidden; animation:fadeUp 0.5s 0.1s ease both; }
        .profile-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--accent),var(--accent2)); }
        .avatar-large { width:72px; height:72px; background:var(--surface2); border:2px solid var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:32px; box-shadow:0 0 20px var(--glow); flex-shrink:0; }
        .profile-info { flex:1; }
        .profile-info h2 { font-family:'Rajdhani',sans-serif; font-size:22px; font-weight:700; letter-spacing:1px; margin-bottom:2px; }
        .rank { font-size:11px; font-weight:500; letter-spacing:3px; color:var(--gold); text-transform:uppercase; margin-bottom:10px; }
        .level-row { display:flex; align-items:center; gap:12px; margin-bottom:8px; font-size:13px; color:var(--text-muted); }
        .level-badge { background:var(--accent); color:#fff; font-family:'Rajdhani',sans-serif; font-weight:700; font-size:12px; letter-spacing:1px; padding:2px 10px; border-radius:20px; }
        .progress-bar { height:6px; background:var(--surface2); border-radius:99px; overflow:hidden; }
        .progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:99px; width:0%; transition:width 1s cubic-bezier(0.4,0,0.2,1); }
        .exp-label { font-size:12px; color:var(--text-muted); margin-top:5px; }

        /* Grid */
        .dashboard-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
        @media(max-width:640px){ .dashboard-grid{grid-template-columns:1fr;} .main-content{padding:16px;} }

        /* Card */
        .card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:20px; animation:fadeUp 0.5s ease both; }
        .card:nth-child(1){animation-delay:0.2s;} .card:nth-child(2){animation-delay:0.3s;}
        .card h3 { font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); margin-bottom:16px; }

        /* Logros */
        .medals-row { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
        .medal { width:44px; height:44px; background:var(--surface2); border:1px solid var(--border); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; transition:transform 0.2s,box-shadow 0.2s; cursor:default; }
        .medal:hover { transform:translateY(-3px); box-shadow:0 8px 20px rgba(0,0,0,0.3); }
        .stats-row { display:flex; flex-direction:column; gap:6px; }
        .stat-item { display:flex; justify-content:space-between; font-size:13px; color:var(--text-muted); padding:6px 10px; background:var(--surface2); border-radius:8px; }
        .stat-item strong { color:var(--text); font-weight:600; }

        /* Tareas */
        .task-list { list-style:none; display:flex; flex-direction:column; gap:8px; }
        .task-item { display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--surface2); border-radius:10px; border:1px solid transparent; cursor:pointer; transition:border-color 0.2s,opacity 0.2s; font-size:13px; }
        .task-item:hover:not(.locked) { border-color:var(--border); }
        .task-item.done { opacity:0.55; }
        .task-item.locked { cursor:not-allowed; opacity:0.4; }
        .task-item.done .task-desc { text-decoration:line-through; color:var(--text-muted); }
        .task-check { width:18px; height:18px; border:2px solid var(--border); border-radius:5px; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background 0.2s,border-color 0.2s; font-size:11px; }
        .task-item.done .task-check { background:var(--green); border-color:var(--green); }
        .task-item.locked .task-check { background:#444; border-color:#444; }
        .task-desc { flex:1; }
        .task-exp { font-size:11px; font-weight:600; color:var(--gold); background:rgba(240,180,41,0.1); padding:2px 7px; border-radius:20px; }
        .task-lock { font-size:12px; color:var(--text-muted); }

        /* Countdown */
        .countdown-card { grid-column:1 / -1; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:16px 20px; display:flex; align-items:center; justify-content:space-between; gap:12px; animation:fadeUp 0.5s 0.4s ease both; }
        .countdown-label { font-family:'Rajdhani',sans-serif; font-size:13px; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); }
        .countdown-timer { font-family:'Rajdhani',sans-serif; font-size:28px; font-weight:700; color:var(--accent); letter-spacing:4px; }

        /* Loading */
        .loading-overlay { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:999; transition:opacity 0.4s; }
        .loading-spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }

        /* Toast */
        .toast { position:fixed; bottom:24px; right:24px; background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--green); border-radius:10px; padding:12px 18px; font-size:13px; box-shadow:0 8px 24px rgba(0,0,0,0.4); transform:translateY(80px); opacity:0; transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1); z-index:200; max-width:280px; }
        .toast.show { transform:translateY(0); opacity:1; }
        .toast.error { border-left-color:var(--red); }
        .toast.warn  { border-left-color:var(--gold); }

        @keyframes fadeUp   { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
        @keyframes fadeDown { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
        @keyframes spin     { to{transform:rotate(360deg)} }
        @keyframes floatUp  { 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(-40px);opacity:0} }
        @keyframes popIn    { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div></div>
    <div class="toast" id="toast"></div>

    <nav class="side-menu">
        <div class="menu-item active">🏠</div>
        <div class="menu-item"><a href="chat.html">💬</a></div>
        <div class="menu-item">🏆</div>
    </nav>

    <main class="main-content">
        <header class="top-bar">
            <h1>Home</h1>
            <div class="user-avatar-small">👤</div>
        </header>

        <section class="profile-card">
            <div class="avatar-large">👤</div>
            <div class="profile-info">
                <h2 id="nombreUsuario">Cargando...</h2>
                <p class="rank" id="rankUsuario">—</p>
                <div class="level-row">
                    <span class="level-badge" id="nivelUsuario">— EXP</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <div class="exp-label" id="expLabel">Calculando progreso...</div>
            </div>
        </section>

        <div class="dashboard-grid">
            <section class="card achievements">
                <h3>Mis Logros</h3>
                <div class="medals-row" id="medalsRow">
                    <div class="medal">🏅</div><div class="medal">🥇</div>
                    <div class="medal">🛡️</div><div class="medal">🎖️</div>
                </div>
                <div class="stats-row">
                    <div class="stat-item"><span>Tareas completadas</span><strong id="tareasCompletadas">—</strong></div>
                    <div class="stat-item"><span>EXP total</span><strong id="expTotal">—</strong></div>
                    <div class="stat-item"><span>Rango actual</span><strong id="rangoActual">—</strong></div>
                </div>
            </section>

            <section class="card tasks">
                <h3>Tareas Activas</h3>
                <ul class="task-list" id="taskList">
                    <li class="task-item"><span class="task-desc" style="color:var(--text-muted)">Cargando tareas...</span></li>
                </ul>
            </section>

            <div class="countdown-card">
                <div>
                    <div class="countdown-label">Próxima tarea diaria</div>
                    <div class="countdown-timer" id="countdown">--:--:--</div>
                </div>
                <div style="font-size:28px">⏳</div>
            </div>
        </div>
    </main>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="js/exp.js"></script>
    <script>

        // ── Auth guard ───────────────────────────────────────────
        const usuarioLocal = JSON.parse(localStorage.getItem("usuario"));
        const token        = localStorage.getItem("token");
        if (!usuarioLocal || !token) window.location.href = "index.html";

        function authHeaders() {
            return { "Content-Type":"application/json", "Authorization":`Bearer ${token}` };
        }

        // ── Socket + EXP en tiempo real ──────────────────────────
        const socket = io(API_URL);
        iniciarSocketEXP(socket, usuarioLocal.id);

        // ── Toast ────────────────────────────────────────────────
        function showToast(msg, type = "success") {
            const t = document.getElementById("toast");
            t.textContent = msg;
            t.className = `toast show ${type}`;
            setTimeout(() => t.className = "toast", 3200);
        }

        // ── Renderizar EXP/rango desde BD ───────────────────────
        function renderEstado(estado) {
            const {
                Nombre, NombreRango, PuntosActuales,
                PuntosRangoActual = 0, PuntosSiguienteRango
            } = estado;

            document.getElementById("nombreUsuario").textContent = Nombre || usuarioLocal.nombre;
            document.getElementById("rankUsuario").textContent   = (NombreRango || "Novato").toUpperCase();
            document.getElementById("nivelUsuario").textContent  = (PuntosActuales || 0) + " EXP";
            document.getElementById("expTotal").textContent      = PuntosActuales || 0;
            document.getElementById("rangoActual").textContent   = NombreRango || "Novato";

            const base     = PuntosRangoActual || 0;
            const techo    = PuntosSiguienteRango || PuntosActuales || 1;
            const progreso = Math.min(100, Math.round(((PuntosActuales - base) / (techo - base || 1)) * 100));

            setTimeout(() => {
                document.getElementById("progressFill").style.width = progreso + "%";
            }, 300);

            document.getElementById("expLabel").textContent =
                `${PuntosActuales} / ${PuntosSiguienteRango ?? "MAX"} EXP — ${progreso}% al siguiente rango`;

            // Actualizar localStorage
            const u = JSON.parse(localStorage.getItem("usuario")) || {};
            u.exp   = PuntosActuales;
            u.rango = NombreRango;
            localStorage.setItem("usuario", JSON.stringify(u));
        }

        // ── Cargar estado desde BD ───────────────────────────────
        async function cargarEstado() {
            try {
                const res  = await fetch(`${API_URL}/api/usuario/me`, { headers: authHeaders() });
                const data = await res.json();
                if (data.success && data.usuario) renderEstado(data.usuario);
            } catch (err) {
                console.error("[cargarEstado]", err);
            }
        }

        // ── Tareas ───────────────────────────────────────────────
        let tareasData = [];

        async function cargarTareas() {
            try {
                const res  = await fetch(`${API_URL}/api/tareas/${usuarioLocal.id}`, { headers: authHeaders() });
                const data = await res.json();
                tareasData = data.tareas ?? [];
                renderTareas();
            } catch (err) {
                console.error("[cargarTareas]", err);
                document.getElementById("taskList").innerHTML =
                    `<li style="color:var(--text-muted);font-size:13px;padding:8px">Error al cargar tareas</li>`;
            }
        }

        function renderTareas() {
            const lista = document.getElementById("taskList");
            if (!tareasData.length) {
                lista.innerHTML = `<li style="color:var(--text-muted);font-size:13px;padding:8px">Sin tareas activas 🎉</li>`;
                document.getElementById("tareasCompletadas").textContent = "0";
                return;
            }

            lista.innerHTML = "";
            let completadas = 0;

            tareasData.forEach(tarea => {
                const hecha    = tarea.Estatus === true || tarea.Estatus === 1;
                const bloqueada = tarea.Bloqueada === true;
                if (hecha) completadas++;

                const li = document.createElement("li");
                li.className = "task-item" + (hecha ? " done" : "") + (bloqueada ? " locked" : "");
                li.dataset.id = tarea.IdTarea;

                li.innerHTML = `
                    <div class="task-check">${hecha ? (bloqueada ? "🔒" : "✓") : ""}</div>
                    <span class="task-desc">${tarea.Descripcion}</span>
                    ${bloqueada
                        ? `<span class="task-lock" title="No se puede desmarcar">🔒</span>`
                        : `<span class="task-exp">+${tarea.ValorPuntos ?? 0} EXP</span>`
                    }
                `;

                if (!bloqueada) li.addEventListener("click", () => toggleTarea(tarea, li));
                lista.appendChild(li);
            });

            document.getElementById("tareasCompletadas").textContent = completadas;
        }

        async function toggleTarea(tarea, el) {
            const hecha       = tarea.Estatus === true || tarea.Estatus === 1;
            const nuevoEstatus = !hecha;

            try {
                const res = await fetch(`${API_URL}/api/tareas/${tarea.IdTarea}`, {
                    method: "PUT",
                    headers: authHeaders(),
                    body: JSON.stringify({ estatus: nuevoEstatus })
                });
                const data = await res.json();

                if (!data.success) {
                    if (data.bloqueada) {
                        showToast("🔒 No puedes desmarcar esta tarea después de 20 min", "warn");
                        tarea.Bloqueada = true;
                        renderTareas();
                    } else {
                        showToast(data.message || "Error al actualizar", "error");
                    }
                    return;
                }

                // Actualizar estado local
                tarea.Estatus = nuevoEstatus;

                // Si se completó y hay EXP devuelta → actualizar UI
                if (nuevoEstatus && data.exp) {
                    actualizarUIexp(data.exp);
                    showToast(`+${tarea.ValorPuntos} EXP ganados ✨`);
                } else if (!nuevoEstatus) {
                    showToast("↩️ Tarea reabierta");
                }

                // Re-cargar estado completo desde BD para mantener sincronía
                cargarEstado();
                renderTareas();

            } catch (err) {
                console.error(err);
                showToast("Error de conexión", "error");
            }
        }

        // ── Rangos/medallas ──────────────────────────────────────
        async function cargarRangos() {
            try {
                const res  = await fetch(`${API_URL}/api/rangos/${usuarioLocal.id}`, { headers: authHeaders() });
                const data = await res.json();
                const rangos = data.rangos ?? [];
                const iconos = ["🏅","🥇","🛡️","🎖️","👑","⚔️","🔥","💎"];
                const row    = document.getElementById("medalsRow");
                if (rangos.length) {
                    row.innerHTML = rangos.slice(0, 6)
                        .map((_, i) => `<div class="medal">${iconos[i % iconos.length]}</div>`).join("");
                }
            } catch {}
        }

        // ── Countdown ────────────────────────────────────────────
        function iniciarCountdown() {
            function tick() {
                const ahora  = new Date();
                const manana = new Date(ahora);
                manana.setDate(ahora.getDate() + 1);
                manana.setHours(0, 0, 0, 0);
                const diff = manana - ahora;
                const hh = String(Math.floor(diff / 3600000)).padStart(2, "0");
                const mm = String(Math.floor((diff % 3600000) / 60000)).padStart(2, "0");
                const ss = String(Math.floor((diff % 60000) / 1000)).padStart(2, "0");
                document.getElementById("countdown").textContent = `${hh}:${mm}:${ss}`;
            }
            tick();
            setInterval(tick, 1000);
        }

        // ── Init ─────────────────────────────────────────────────
        async function init() {
            await Promise.all([cargarEstado(), cargarTareas(), cargarRangos()]);
            iniciarCountdown();
            document.getElementById("loadingOverlay").style.opacity = "0";
            setTimeout(() => document.getElementById("loadingOverlay")?.remove(), 400);
        }

        init();
    </script>
</body>
</html>
